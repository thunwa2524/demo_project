<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Tracker</title>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Canvas background */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.25);
            /* Glassmorphism ด้านใน */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            /* ขอบมน */
            padding: 25px 30px;
            width: 320px;
            text-align: center;

            /* Glow effect */
            box-shadow: 0 0 20px rgba(198, 70, 70, 0.6),
                0 0 40px rgba(255, 255, 255, 0.3),
                0 0 60px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(10, 10, 10, 0.3);
            /* optional ขอบบาง */
        }

        h2 {
            margin: 10px 0 20px 0;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .input-group label {
            flex: 1;
            font-weight: 500;
            text-align: left;
        }

        .input-group input {
            flex: 2;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .input-group lord-icon {
            width: 30px;
            height: 30px;
            margin-left: 8px;
            cursor: pointer;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: rgba(243, 207, 176, 0.8);
            color: #040404;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(2px);
        }

        button:hover {
            background: rgba(243, 207, 176, 0.8);
        }

        #result {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .history {
            margin-top: 20px;
        }

        .history h3 {
            margin-bottom: 10px;
            font-size: 1em;
            text-align: center;
        }

        .history ul {
            list-style: none;
            padding: 0;
            max-height: 150px;
            overflow-y: auto;
        }

        .history li {
            background: rgba(225, 245, 254, 0.6);
            margin-bottom: 5px;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        /* Lordicon size */
        lord-icon.main-icon {
            margin: 0 auto;
            display: block;
            width: 150px;
            height: 150px;
        }
    </style>
</head>

<body>

    <!-- Canvas Background -->
    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <!-- Lordicon main -->
        <lord-icon src="https://cdn.lordicon.com/hmpomorl.json" trigger="hover" stroke="bold"
            colors="primary:#121331,secondary:#f49cc8" class="main-icon">
        </lord-icon>

        <h2>BMI Tracker</h2>

        <form id="bmiForm">
            <div class="input-group">
                <label>ชื่อ(name)</label>
                <input type="text" id="name" required>
                <script src="https://cdn.lordicon.com/lordicon.js"></script>
                <lord-icon src="https://cdn.lordicon.com/krmtxpdf.json" trigger="hover" stroke="bold"
                    colors="primary:#f49cc8"> </lord-icon>
            </div>

            <div class="input-group">
                <label>อายุ(age)</label>
                <input type="number" id="age" min="1" required>
                <script src="https://cdn.lordicon.com/lordicon.js"></script>
                <lord-icon src="https://cdn.lordicon.com/warimioc.json" trigger="loop" stroke="bold"
                    state="loop-oscillate" colors="primary:#f49cc8,secondary:#545454"></lord-icon>
            </div>

            <div class="input-group">
                <label>น้ำหนัก (kg)</label>
                <input type="number" id="weight" min="1" required>
                <script src="https://cdn.lordicon.com/lordicon.js"></script>
                <lord-icon src="https://cdn.lordicon.com/cwnzgsrk.json" trigger="hover" stroke="bold"
                    colors="primary:#545454,secondary:#f49cc8"></lord-icon>
            </div>

            <div class="input-group">
                <label>ส่วนสูง (cm)</label>
                <input type="number" id="height" min="30" required>
                <script src="https://cdn.lordicon.com/lordicon.js"></script>
                <lord-icon src="https://cdn.lordicon.com/zkboyyym.json" trigger="hover" stroke="bold"
                    colors="primary:#545454,secondary:#f49cc8"></lord-icon>
            </div>

            <button type="submit">คำนวณ BMI</button>
        </form>

        <div id="result"></div>

        <div class="history">
            <h3>ประวัติ BMI</h3>
            <ul id="bmiHistory"></ul>
        </div>
    </div>

    <script>
        // ----------- Gradient Background Animation -------------
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let time = 0;
        function animateBg() {
            const width = canvas.width;
            const height = canvas.height;

            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, `hsl(${(time * 40) % 360}, 70%, 85%)`);
            gradient.addColorStop(0.5, `hsl(${(time * 60) % 360}, 80%, 90%)`);
            gradient.addColorStop(1, `hsl(${(time * 80) % 360}, 70%, 85%)`);

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            time += 0.01;
            requestAnimationFrame(animateBg);
        }
        animateBg();
        // ------------------------------------------------------

        const form = document.getElementById('bmiForm');
        const resultDiv = document.getElementById('result');
        const historyUl = document.getElementById('bmiHistory');

        // โหลด history จาก localStorage
        let bmiHistory = JSON.parse(localStorage.getItem('bmiHistory')) || [];
        renderHistory();

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const age = parseInt(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const heightCm = parseFloat(document.getElementById('height').value);
            const heightM = heightCm / 100;

            if (weight <= 0 || heightCm <= 0) {
                resultDiv.innerText = "กรุณากรอกค่าน้ำหนักและส่วนสูงให้ถูกต้อง";
                return;
            }

            const bmi = weight / (heightM * heightM);
            let category = '';
            if (bmi < 18.5) category = 'ผอมเกินไป';
            else if (bmi < 25) category = 'ปกติ';
            else if (bmi < 30) category = 'น้ำหนักเกิน';
            else category = 'อ้วน';

            const message = `${name}, อายุ ${age} ปี → BMI: ${bmi.toFixed(1)} (${category})`;
            resultDiv.innerText = message;

            // บันทึกประวัติ
            const record = { date: new Date().toLocaleDateString(), message };
            bmiHistory.push(record);
            if (bmiHistory.length > 10) bmiHistory.shift(); // เก็บล่าสุด 10 รายการ
            localStorage.setItem('bmiHistory', JSON.stringify(bmiHistory));
            renderHistory();
            form.reset();
        });

        function renderHistory() {
            historyUl.innerHTML = '';
            bmiHistory.forEach(rec => {
                const li = document.createElement('li');
                li.innerText = `[${rec.date}] ${rec.message}`;
                historyUl.appendChild(li);
            });
        }
    </script>

</body>

</html>
