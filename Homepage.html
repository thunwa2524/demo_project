<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Health Detection System</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* ===== Base ===== */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;

            background: linear-gradient(135deg,
                    #fbc2c2 0%,
                    #ffffff 40%,
                    #a8c4f0 70%,
                    #eca3fb 100%);

            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ===== App ===== */
        .app {
            position: relative;
            z-index: 10;
            max-width: 900px;
            width: 90%;
            margin: 0 auto;
            padding-top: 5vh;
            text-align: center;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        /* ===== ICON GLOW (ตาม shape) ===== */
        .icon-glow {
            display: inline-block;
            filter:
                drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 20px rgba(253, 6, 2, 0.7));
            transition: 0.3s;
        }

        .icon-glow:hover {
            filter:
                drop-shadow(0 0 15px rgba(255, 255, 255, 1)) drop-shadow(0 0 30px rgba(253, 6, 2, 0.8));
        }

        /* ===== TITLE ===== */
        .title {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 700;

            margin: 0;
            line-height: 1;

            display: inline-block;
            padding: clamp(10px, 2vw, 14px) clamp(20px, 4vw, 28px);
            background: rgba(255, 255, 255, 1);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 3px solid rgba(75, 72, 72, 0.6);
            box-shadow: 0 0 15px rgb(228, 90, 90);
            position: relative;

            transform: translateY(2px);

        }

        .title::after {
            content: "";
            position: absolute;
            bottom: 6px;
            left: 20%;
            width: 60%;
            height: 3px;
            background: linear-gradient(to right, #fbc2c2, #a8c4f0);
            border-radius: 2px;
        }

        /* ===== GRID ===== */
        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 40px;
        }

        /* ===== CARD ===== */
        .card {
            flex: 1 1 280px;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.03);
        }

        .card:active {
            transform: scale(0.96);
        }

        .name {
            font-size: clamp(18px, 3vw, 22px);
            font-weight: 600;
            margin-top: 10px;
        }

        .desc {
            font-size: clamp(12px, 2.5vw, 14px);
            color: #555;
            margin-top: 10px;
        }

        .facial {
            border: 2px solid #f78080;
        }

        .arm {
            border: 2px solid #a8c4f0;
        }

        .bmi {
            border: 2px solid #eca3fb;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            z-index: 0;
            opacity: 0;
            transition: 0.4s;
        }

        .card>* {
            position: relative;
            z-index: 1;
        }

        .facial::before {
            background: radial-gradient(circle, rgba(247, 128, 128, 0.5), transparent 30%);
        }

        .arm::before {
            background: radial-gradient(circle, rgba(168, 196, 240, 0.5), transparent 30%);
        }

        .bmi::before {
            background: radial-gradient(circle, rgba(235, 135, 235, 0.5), transparent 30%);
        }

        .card:hover::before {
            opacity: 1;
            transform: scale(1.1);
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }


        /* ===== MEDICAL GLITTER ===== */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;

            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='17' y='8' width='6' height='24' fill='white' fill-opacity='0.4'/%3E%3Crect x='8' y='17' width='24' height='6' fill='white' fill-opacity='0.4'/%3E%3C/svg%3E");

            background-size: 120px 120px;
            opacity: 0.4;
            animation: medFloat 20s linear infinite;
        }

        @keyframes medFloat {
            0% {
                transform: rotate(0deg);
                background-position: 0 0;
            }

            50% {
                transform: rotate(5deg);

                background-position: 100px 100px;
            }

            100% {
                transform: rotate(0deg);
                background-position: 200px 200px;
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <div class="header" data-aos="fade-down" data-aos-duration="1200">

            <div class="icon-glow">
                <script src="https://cdn.lordicon.com/lordicon.js"></script>
                <lord-icon src="https://cdn.lordicon.com/papxnmwt.json" trigger="loop" state="loop-cycle"
                    colors="primary:#121331,secondary:#ee6d66" style="width:150px;height:150px">
                </lord-icon>
            </div>

            <div class="title">
                Health Detection System
            </div>
        </div>

        <div class="grid">
            <div class="card facial" onclick="goFacial()" data-aos="fade-up" data-aos-delay="600">
                <script src="https://cdn.lordicon.com/lordicon.js"></script>
                <lord-icon src="https://cdn.lordicon.com/kdduutaw.json" trigger="morph" state="morph-group"
                    colors="primary:#f4a09c,secondary:#ee6d66">
                </lord-icon>
                <div class="name">Facial Detection</div>
                <div class="desc">Analyze facial symmetry and muscle weakness</div>
            </div>

            <div class="card arm" onclick="goArm()" data-aos="fade-up" data-aos-delay="800">
                <lord-icon src="https://cdn.lordicon.com/ilhuppkd.json" trigger="hover"
                    colors="primary:#9cc2f4,secondary:#9cc2f4" style="width:50px;height:50px">
                </lord-icon>
                <div class="name">Lateral Arm Detection</div>
                <div class="desc">Check arm elevation and shoulder weakness</div>
            </div>

            <div class="card bmi" onclick="goBMI()" data-aos="fade-up" data-aos-delay="1000">
                <lord-icon src="https://cdn.lordicon.com/lbcxnxti.json" trigger="hover"
                    colors="primary:#121331,secondary:#f49cc8" style="width:50px;height:50px">
                </lord-icon>
                <div class="name">BMI Calculator</div>
                <div class="desc">Calculate body mass index</div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 2000,
            once: true,
            easing: 'ease-out-back'
        });

        function goFacial() { window.location.href = "facial_detection.html"; }
        function goArm() { window.location.href = "latheral_detection.html"; }
        function goBMI() { window.location.href = "Bmi.html"; }
    </script>

</body>

</html>
